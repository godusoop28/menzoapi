databases:
  - name: menzo-db
    plan: free
    databaseName: menzo
    user: menzo

services:
  - type: web
    name: menzo-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: menzo-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: menzo-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: menzo-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: menzo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: menzo-db
          property: password
      - key: DB_POOL_SIZE
        value: "5"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MINUTES
        value: "15"
      - key: JWT_REFRESH_TTL_DAYS
        value: "30"
      - key: JWT_ISSUER
        value: menzo-api
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: UPLOADS_DIR
        value: /app/uploads
      # No hace falta declarar UPLOADS_PUBLIC_BASE_URL: Render inyecta RENDER_EXTERNAL_URL
      # solo y application.yml ya arma la URL pública de /files con eso.
      - key: LOG_LEVEL
        value: INFO
      # Dejar en "dev" siembra 3 usuarios/posts/sala de ejemplo para poder probar la app
      # apenas se despliega. Quitar esta variable (o ponerla vacía) para producción real.
      - key: SPRING_PROFILES_ACTIVE
        value: dev
