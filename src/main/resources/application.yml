spring:
  application:
    name: menzo

  datasource:
    # DB_URL manda si está seteada (uso local/manual). En Render se arma sola desde
    # DB_HOST/DB_PORT/DB_NAME, que se pueden apuntar a las propiedades del recurso Postgres.
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:menzo}}
    username: ${DB_USERNAME:menzo}
    password: ${DB_PASSWORD:menzo}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  # Render (y otros PaaS) inyectan PORT en runtime; SERVER_PORT sigue funcionando para local/Docker manual.
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always

menzo:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-please-override-in-prod-min-32-bytes}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
    issuer: ${JWT_ISSUER:menzo-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
    # RENDER_EXTERNAL_URL la inyecta Render automáticamente en cada web service (https://<servicio>.onrender.com).
    public-base-url: ${UPLOADS_PUBLIC_BASE_URL:${RENDER_EXTERNAL_URL:http://localhost:8080}/files}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.menzo: ${LOG_LEVEL:INFO}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

logging:
  level:
    com.menzo: DEBUG
    org.hibernate.SQL: DEBUG

menzo:
  seed:
    demo-data: true
